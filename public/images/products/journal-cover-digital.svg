<svg width="800" height="1000" viewBox="0 0 800 1000" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="journalBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#efe9de"/>
      <stop offset="100%" stop-color="#ddd4c0"/>
    </linearGradient>
    <linearGradient id="cover1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#2a2a2a"/>
    </linearGradient>
    <linearGradient id="cover2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6b8c7a"/>
      <stop offset="100%" stop-color="#4f6b5c"/>
    </linearGradient>
    <linearGradient id="cover3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#b85c38"/>
      <stop offset="100%" stop-color="#94432a"/>
    </linearGradient>
  </defs>
  <rect width="800" height="1000" fill="url(#journalBg)"/>

  <!-- three fanned journal covers -->
  <g transform="translate(400,520)">
    <!-- back cover -->
    <g transform="rotate(-12) translate(-260,-340)">
      <rect width="320" height="420" rx="6" fill="url(#cover3)" stroke="#c9a84c" stroke-width="2"/>
      <line x1="40" y1="60" x2="280" y2="60" stroke="#e8c96b" stroke-width="1.5" opacity="0.7"/>
      <text x="160" y="220" font-family="Cormorant Garamond, Georgia, serif" font-size="34" fill="#f5f3ef" text-anchor="middle">III</text>
    </g>
    <!-- middle cover -->
    <g transform="rotate(0) translate(-160,-360)">
      <rect width="320" height="420" rx="6" fill="url(#cover2)" stroke="#c9a84c" stroke-width="2"/>
      <line x1="40" y1="60" x2="280" y2="60" stroke="#e8c96b" stroke-width="1.5" opacity="0.7"/>
      <text x="160" y="220" font-family="Cormorant Garamond, Georgia, serif" font-size="34" fill="#f5f3ef" text-anchor="middle">II</text>
    </g>
    <!-- front cover -->
    <g transform="rotate(12) translate(-60,-380)">
      <rect width="320" height="420" rx="6" fill="url(#cover1)" stroke="#c9a84c" stroke-width="2"/>
      <line x1="40" y1="60" x2="280" y2="60" stroke="#c9a84c" stroke-width="1.5"/>
      <text x="160" y="210" font-family="Cormorant Garamond, Georgia, serif" font-size="40" fill="#c9a84c" text-anchor="middle">I</text>
      <text x="160" y="380" font-family="DM Sans, sans-serif" font-size="11" letter-spacing="3" fill="#c9a84c" text-anchor="middle" opacity="0.8">JOURNAL</text>
    </g>
  </g>

  <!-- caption -->
  <text x="400" y="920" font-family="Georgia, serif" font-size="20" fill="#5c5340" text-anchor="middle" letter-spacing="5">PRINTABLE JOURNAL COVERS</text>
  <text x="400" y="950" font-family="Georgia, serif" font-size="12" fill="#9c8c68" text-anchor="middle" letter-spacing="3">INSTANT PDF DOWNLOAD</text>
</svg>
