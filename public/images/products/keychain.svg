<svg width="800" height="1000" viewBox="0 0 800 1000" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="keychainBg" cx="50%" cy="35%" r="75%">
      <stop offset="0%" stop-color="#faf8f4"/>
      <stop offset="100%" stop-color="#e6ddc8"/>
    </radialGradient>
    <linearGradient id="brassMetal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e8c96b"/>
      <stop offset="45%" stop-color="#c9a84c"/>
      <stop offset="100%" stop-color="#8a6a2e"/>
    </linearGradient>
    <linearGradient id="leatherStrap" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#7a4a30"/>
      <stop offset="100%" stop-color="#5c3520"/>
    </linearGradient>
  </defs>
  <rect width="800" height="1000" fill="url(#keychainBg)"/>
  <ellipse cx="400" cy="760" rx="170" ry="34" fill="#7a6a4a" opacity="0.18"/>

  <!-- leather strap -->
  <path d="M380,160 C360,220 360,280 380,330" stroke="url(#leatherStrap)" stroke-width="26" fill="none" stroke-linecap="round"/>
  <path d="M420,160 C440,220 440,280 420,330" stroke="url(#leatherStrap)" stroke-width="26" fill="none" stroke-linecap="round"/>
  <circle cx="400" cy="160" r="20" fill="url(#leatherStrap)"/>

  <!-- key ring -->
  <circle cx="400" cy="330" r="34" fill="none" stroke="url(#brassMetal)" stroke-width="10"/>

  <!-- charm body: souvenir shape (rounded shield) -->
  <g transform="translate(400,560)">
    <path d="M-150,-150 L150,-150 L150,60 C150,160 0,230 0,230 C0,230 -150,160 -150,60 Z"
      fill="url(#brassMetal)" stroke="#6b4f1f" stroke-width="3"/>
    <path d="M-130,-130 L130,-130 L130,55 C130,145 0,205 0,205 C0,205 -130,145 -130,55 Z"
      fill="none" stroke="#fff6d8" stroke-width="2" opacity="0.5"/>
    <!-- star emblem -->
    <g fill="#fffaf0" opacity="0.9">
      <polygon points="0,-70 18,-20 72,-20 28,12 44,64 0,32 -44,64 -28,12 -72,-20 -18,-20" />
    </g>
    <text x="0" y="120" font-family="DM Sans, sans-serif" font-size="16" letter-spacing="3" fill="#3f2d10" text-anchor="middle">SOUVENIR</text>
  </g>

  <text x="400" y="900" font-family="Georgia, serif" font-size="20" fill="#5c5340" text-anchor="middle" letter-spacing="5">KEEPSAKE KEYCHAIN</text>
  <text x="400" y="930" font-family="Georgia, serif" font-size="12" fill="#9c8c68" text-anchor="middle" letter-spacing="3">SOLID BRASS · LEATHER STRAP</text>
</svg>
