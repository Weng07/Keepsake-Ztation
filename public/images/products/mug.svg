<svg width="800" height="1000" viewBox="0 0 800 1000" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="mugBg" cx="50%" cy="35%" r="75%">
      <stop offset="0%" stop-color="#faf8f4"/>
      <stop offset="100%" stop-color="#e6ddc8"/>
    </radialGradient>
    <linearGradient id="mugBody" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fdfbf6"/>
      <stop offset="50%" stop-color="#f1ece0"/>
      <stop offset="100%" stop-color="#d8cdb4"/>
    </linearGradient>
    <linearGradient id="mugInside" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#c9a84c"/>
      <stop offset="100%" stop-color="#8a6a2e"/>
    </linearGradient>
  </defs>
  <rect width="800" height="1000" fill="url(#mugBg)"/>
  <ellipse cx="400" cy="760" rx="200" ry="36" fill="#7a6a4a" opacity="0.18"/>

  <!-- mug handle -->
  <path d="M580,420 C680,420 680,620 580,620" fill="none" stroke="url(#mugBody)" stroke-width="34" stroke-linecap="round"/>
  <path d="M580,420 C680,420 680,620 580,620" fill="none" stroke="#c9bba0" stroke-width="2" stroke-linecap="round" opacity="0.5"/>

  <!-- mug body -->
  <path d="M260,380 L600,380 L580,660 C580,700 540,720 430,720 C320,720 280,700 280,660 Z"
    fill="url(#mugBody)" stroke="#c9bba0" stroke-width="2"/>

  <!-- mug rim ellipse (top opening) -->
  <ellipse cx="430" cy="380" rx="170" ry="28" fill="url(#mugInside)" stroke="#9c8c68" stroke-width="2"/>
  <ellipse cx="430" cy="372" rx="170" ry="26" fill="none" stroke="#fffaf0" stroke-width="2" opacity="0.4"/>

  <!-- emblem on mug body -->
  <g transform="translate(430,540)">
    <circle r="92" fill="none" stroke="#c9a84c" stroke-width="3"/>
    <circle r="78" fill="none" stroke="#c9a84c" stroke-width="1" opacity="0.6"/>
    <text x="0" y="-10" font-family="Cormorant Garamond, Georgia, serif" font-style="italic" font-size="34" fill="#5c4a2a" text-anchor="middle">keep</text>
    <text x="0" y="28" font-family="DM Sans, sans-serif" font-size="11" letter-spacing="3" fill="#9c8c68" text-anchor="middle">SAKE</text>
  </g>

  <text x="400" y="900" font-family="Georgia, serif" font-size="20" fill="#5c5340" text-anchor="middle" letter-spacing="5">SOUVENIR MUG</text>
  <text x="400" y="930" font-family="Georgia, serif" font-size="12" fill="#9c8c68" text-anchor="middle" letter-spacing="3">GLAZED CERAMIC · 11OZ</text>
</svg>
